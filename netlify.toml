[build]
  command = "pnpm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

# Daily on the 1st–7th of each month at 10am EST (15:00 UTC).
# Sends 50 emails/day across a 7-day window (350 users max).
# See src/lib/config/reminders.ts for the rate-limit constants.
[functions."freshness-reminder"]
  schedule = "0 15 1-7 * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  command = "pnpm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false

# Non-secret deploy context labels — read by EnvironmentBanner component
[context.production.environment]
  PUBLIC_DEPLOY_CONTEXT = "production"

[context.deploy-preview.environment]
  PUBLIC_DEPLOY_CONTEXT = "deploy-preview"

[context.branch-deploy.environment]
  PUBLIC_DEPLOY_CONTEXT = "branch-deploy"
